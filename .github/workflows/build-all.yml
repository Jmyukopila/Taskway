name: Build APK + IPA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiDia-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS archive (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ${{ runner.temp }}/MiDia.xcarchive \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/MiDia.xcarchive \
            -exportPath ${{ runner.temp }}/MiDia.ipa \
            -exportOptionsPlist .github/exportOptions.plist
        continue-on-error: true

      - name: Create unsigned IPA directory
        run: |
          mkdir -p ${{ runner.temp }}/MiDia-unsigned
          cp -r "${{ runner.temp }}/MiDia.xcarchive/Products/Applications" ${{ runner.temp }}/MiDia-unsigned/
          cd ${{ runner.temp }}/MiDia-unsigned
          mkdir -p Payload
          cp -r Applications/*.app Payload/
          zip -r ${{ runner.temp }}/MiDia-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiDia-iOS
          path: |
            ${{ runner.temp }}/MiDia.ipa
            ${{ runner.temp }}/MiDia-unsigned.ipa
